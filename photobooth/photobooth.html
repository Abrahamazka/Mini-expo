<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Photobooth</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      rel="stylesheet"
      href="https://public.codepenassets.com/css/normalize-5.0.0.min.css"
    />
    <link rel="stylesheet" href="./style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="overflow-x-hidden">
    <canvas id="c" class="fixed inset-0 -z-10"></canvas>

<div
  id="navWrapper"
  class="fixed top-5 left-1/2 z-50 flex w-[calc(100%-16px)] max-w-[390px] -translate-x-1/2 items-center justify-center transition-transform duration-300 ease-in-out sm:w-auto sm:max-w-none"
>
  <nav class="w-full rounded-full bg-white p-2 shadow-lg sm:w-auto">
    <ul
      id="navMenu"
      class="relative flex items-center justify-between whitespace-nowrap sm:justify-center"
    >
      <div
        id="highlight"
        class="absolute top-0 bottom-0 left-0 rounded-full bg-[#321c04]/10 transition-all duration-300 ease-in-out"
      ></div>

      <li>
        <a
          href="../index.html"
          class="nav-item relative z-10 block rounded-full px-4 py-3 text-[15px] font-medium text-[#321c04] sm:px-6"
        >
          Homepage
        </a>
      </li>
      <li>
        <a
          href="./photobooth.html"
          class="nav-item relative z-10 block rounded-full px-4 py-3 text-[15px] font-medium text-[#321c04] sm:px-6"
        >
          Photobooth
        </a>
      </li>
      <li>
        <a
          href="../contact.html"
          class="nav-item relative z-10 block rounded-full px-4 py-3 text-[15px] font-medium text-[#321c04] sm:px-5"
        >
          ContactUs
        </a>
      </li>
    </ul>
  </nav>
</div>

    <main class="relative z-10 mx-auto max-w-[1400px] px-4 pb-20 pt-28 md:px-8">
      <section class="text-center">
        <p class="text-[12px] uppercase tracking-[0.35em] text-white/70">
          Halloween Photobooth
        </p>

        <h1
          class="mt-4 text-4xl font-bold leading-tight text-white md:text-6xl"
        >
          Choose your
          <span id="judul-geser" class="block">favorite border.</span>
        </h1>

        <style>
          #judul-geser {
            font-weight: 700;
            background: linear-gradient(
              90deg,
              #4b4376 0%,
              #ff0000 25%,
              #432654 50%,
              #4b4376 100%
            );
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: geserWarna 5s linear infinite;
          }

          @keyframes geserWarna {
            0% {
              background-position: 0% 50%;
            }
            100% {
              background-position: 200% 50%;
            }
          }
        </style>

        <p
          class="mx-auto mt-4 max-w-[520px] text-sm leading-7 text-white/75 md:text-base"
        >
          Choose the photobooth border you like.
        </p>
      </section>

      <section class="relative mt-12 overflow-hidden py-8">
        <div
          id="carouselTrack"
          class="relative mx-auto h-[620px] max-w-[1400px] md:h-[820px]"
        ></div>

        <div class="mt-4 flex w-full items-center justify-center gap-3">
          <button
            id="prevBtn"
            class="group relative flex h-14 w-14 items-center justify-center overflow-hidden rounded-[18px] border border-white/30 bg-white/10 text-white/80 shadow-[0_8px_30px_rgba(0,0,0,0.12)] backdrop-blur-xl transition duration-300 hover:bg-white/15 hover:text-white"
            aria-label="Previous"
          >
            <span
              class="pointer-events-none absolute inset-x-2 top-1 h-1/2 rounded-full bg-white/20 blur-md"
            ></span>
            <span
              class="pointer-events-none absolute inset-0 rounded-[18px] ring-1 ring-inset ring-white/10"
            ></span>

            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="relative z-10 h-5 w-5 transition group-hover:-translate-x-[1px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.1"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>

          <button
            id="nextBtn"
            class="group relative flex h-14 w-14 items-center justify-center overflow-hidden rounded-[18px] border border-white/30 bg-white/10 text-white/80 shadow-[0_8px_30px_rgba(0,0,0,0.12)] backdrop-blur-xl transition duration-300 hover:bg-white/15 hover:text-white"
            aria-label="Next"
          >
            <span
              class="pointer-events-none absolute inset-x-2 top-1 h-1/2 rounded-full bg-white/20 blur-md"
            ></span>
            <span
              class="pointer-events-none absolute inset-0 rounded-[18px] ring-1 ring-inset ring-white/10"
            ></span>

            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="relative z-10 h-5 w-5 transition group-hover:translate-x-[1px]"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.1"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M9 18l6-6-6-6" />
            </svg>
          </button>
        </div>
      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/1.0.0/anime.min.js"></script>
    <script src="./script.js"></script>

    <script>
      // navbar
      const navItems = document.querySelectorAll(".nav-item");
      const highlight = document.getElementById("highlight");
      const navMenu = document.getElementById("navMenu");
      const navWrapper = document.getElementById("navWrapper");

      let activeIndex = 1;
      let lastScrollY = window.scrollY;

      function moveHighlight(index) {
        const item = navItems[index];
        if (!item || !highlight) return;

        highlight.style.left = item.offsetLeft + "px";
        highlight.style.width = item.offsetWidth + "px";
        highlight.style.height = item.offsetHeight + "px";
      }

      navItems.forEach((item, index) => {
        item.addEventListener("mouseenter", () => {
          moveHighlight(index);
        });

        item.addEventListener("click", () => {
          activeIndex = index;
          moveHighlight(activeIndex);
        });
      });

      if (navMenu) {
        navMenu.addEventListener("mouseleave", () => {
          moveHighlight(activeIndex);
        });
      }

      window.addEventListener("load", () => moveHighlight(activeIndex));
      window.addEventListener("resize", () => moveHighlight(activeIndex));

      window.addEventListener("scroll", () => {
        if (!navWrapper) return;

        const currentScrollY = window.scrollY;

        if (currentScrollY <= 10) {
          navWrapper.classList.remove("-translate-y-32");
          navWrapper.classList.add("translate-y-0");
        } else if (currentScrollY > lastScrollY) {
          navWrapper.classList.remove("translate-y-0");
          navWrapper.classList.add("-translate-y-32");
        } else {
          navWrapper.classList.remove("-translate-y-32");
          navWrapper.classList.add("translate-y-0");
        }

        lastScrollY = currentScrollY;
      });

      // carousel 4 border photo
      const borders = [
        { title: "Option 1", image: "./2.png" },
        { title: "Option 2", image: "./3.png" },
        { title: "Option 3", image: "./4.png" },
        { title: "Option 4", image: "./5.png" },
      ];

      let activeBorder = 0;

      const carouselTrack = document.getElementById("carouselTrack");
      const prevBtn = document.getElementById("prevBtn");
      const nextBtn = document.getElementById("nextBtn");

      let cardElements = [];

      function buildCarousel() {
        carouselTrack.innerHTML = "";
        cardElements = [];

        borders.forEach((border, index) => {
          const card = document.createElement("button");
          card.type = "button";
          card.className =
            "absolute left-1/2 top-1/2 overflow-hidden rounded-[30px] border border-white/20 bg-white/10 p-2 shadow-[0_20px_60px_rgba(0,0,0,0.18)] backdrop-blur-md transition-all duration-700 ease-[cubic-bezier(0.22,1,0.36,1)]";

          card.innerHTML = `
        <div class="relative h-full w-full overflow-hidden rounded-[24px] bg-white/90 p-2">
          <div class="absolute left-1/2 top-[4%] z-10 -translate-x-1/2">
            <span class="whitespace-nowrap rounded-full bg-black/55 px-3 py-1 text-[10px] font-bold uppercase tracking-[0.18em] text-white md:px-4 md:py-1.5 md:text-xs">
              ${border.title}
            </span>
          </div>

          <img
            src="${border.image}"
            alt="${border.title}"
            class="h-full w-full object-contain pt-12"
            draggable="false"
          />
        </div>
      `;

          card.addEventListener("click", () => {
            activeBorder = index;
            updateCarousel();
          });

          carouselTrack.appendChild(card);
          cardElements.push(card);
        });

        updateCarousel(true);
      }

      function updateCarousel(firstRender = false) {
        const isMobile = window.innerWidth < 768;

        carouselTrack.style.height = isMobile ? "520px" : "780px";
        carouselTrack.style.maxWidth = isMobile ? "100%" : "1400px";

        cardElements.forEach((card, index) => {
          const offset = index - activeBorder;
          const distance = Math.abs(offset);

          card.style.height = isMobile ? "420px" : "680px";
          card.style.aspectRatio = "707 / 2000";

          let translateX = offset * (isMobile ? 135 : 220);
          let scale = 0.82;
          let opacity = 0.18;
          let rotate = offset * -8;
          let zIndex = 10 - distance;
          let blur = "blur(1px)";

          if (offset === 0) {
            translateX = 0;
            scale = 1;
            opacity = 1;
            rotate = 0;
            zIndex = 50;
            blur = "blur(0px)";
          } else if (distance === 1) {
            translateX = offset * (isMobile ? 140 : 230);
            scale = 0.88;
            opacity = 0.4;
            rotate = offset * -7;
            zIndex = 30;
            blur = "blur(0.5px)";
          } else {
            translateX = offset * (isMobile ? 155 : 275);
            scale = 0.76;
            opacity = 0.14;
            rotate = offset * -9;
            zIndex = 15;
            blur = "blur(1.5px)";
          }

          card.style.zIndex = zIndex;
          card.style.opacity = opacity;
          card.style.filter = blur;

          if (firstRender) {
            card.style.transform = `translate(-50%, -50%) translateX(${translateX}px) scale(${scale}) rotate(${rotate}deg)`;
          } else {
            requestAnimationFrame(() => {
              card.style.transform = `translate(-50%, -50%) translateX(${translateX}px) scale(${scale}) rotate(${rotate}deg)`;
            });
          }
        });
      }

      prevBtn.addEventListener("click", () => {
        activeBorder = (activeBorder - 1 + borders.length) % borders.length;
        updateCarousel();
      });

      nextBtn.addEventListener("click", () => {
        activeBorder = (activeBorder + 1) % borders.length;
        updateCarousel();
      });

      window.addEventListener("resize", () => updateCarousel(true));

      buildCarousel();
    </script>
  </body>
</html>
