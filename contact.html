<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Mini-expo</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body class="bg-[#FAEEE2] font-['Inter'] text-[#321c04]">
    <div
      id="navWrapper"
      class="fixed top-5 left-1/2 z-50 flex -translate-x-1/2 items-center justify-center transition-transform duration-300 ease-in-out"
    >
      <nav class="rounded-full bg-white p-2 shadow-lg">
        <ul id="navMenu" class="relative flex items-center">
          <div
            id="highlight"
            class="absolute top-0 bottom-0 left-0 rounded-full bg-[#321c04]/10 transition-all duration-300 ease-in-out"
          ></div>

          <li>
            <a
              href="index.html"
              class="nav-item relative z-10 block rounded-full px-6 py-3 font-medium text-[#321c04]"
            >
              Homepage
            </a>
          </li>
          <li>
            <a
              href="#"
              class="nav-item relative z-10 block rounded-full px-6 py-3 font-medium text-[#321c04]"
            >
              Photobooth
            </a>
          </li>
          <li>
            <a
              href="contact.html"
              class="nav-item relative z-10 block rounded-full px-5 py-3 font-medium text-[#321c04]"
            >
              ContactUs
            </a>
          </li>
        </ul>
      </nav>
    </div>
    <main class="px-4 pb-16 pt-32 md:px-8 lg:px-10">
      <section class="mx-auto max-w-[1400px]">
        <div
          class="overflow-hidden rounded-[28px] border border-[#4d2e0b] bg-[#321c04] text-white shadow-[0_20px_60px_rgba(50,28,4,0.18)]"
        >
          <div class="px-6 py-10 md:px-10 md:py-12">
            <div class="mb-10 text-center">
              <p class="text-[12px] uppercase tracking-[0.32em] text-white/55">
                Contact
              </p>
              <h1
                class="mt-4 font-['Cormorant_Garamond'] text-[54px] leading-[0.92] text-white md:text-[88px]"
              >
                Let’s talk
              </h1>
              <p
                class="mx-auto mt-4 max-w-[620px] text-[15px] leading-7 text-white/65 md:text-[16px]"
              >
                Have questions, collaboration ideas, or want to contact us more quickly? Fill out the form below.
              </p>
            </div>

            <form class="space-y-10">
              <div>
                <p
                  class="mb-5 text-[13px] uppercase tracking-[0.32em] text-white/75"
                >
                  Fast call
                </p>

                <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
                  <input
                    type="text"
                    name="nama"
                    placeholder="Full Name *"
                    class="h-[78px] w-full rounded-none border border-white/25 bg-transparent px-7 text-[17px] font-light text-white placeholder:text-white/35 outline-none transition focus:border-[#F67642]"
                  />

                  <input
                    type="text"
                    name="perusahaan"
                    placeholder="Company / Institution"
                    class="h-[78px] w-full rounded-none border border-white/25 bg-transparent px-7 text-[17px] font-light text-white placeholder:text-white/35 outline-none transition focus:border-[#F67642]"
                  />

                  <input
                    type="email"
                    name="email"
                    placeholder="Email *"
                    class="h-[78px] w-full rounded-none border border-white/25 bg-transparent px-7 text-[17px] font-light text-white placeholder:text-white/35 outline-none transition focus:border-[#F67642]"
                  />

                  <input
                    type="tel"
                    name="telepon"
                    placeholder="Phone Number"
                    class="h-[78px] w-full rounded-none border border-white/25 bg-transparent px-7 text-[17px] font-light text-white placeholder:text-white/35 outline-none transition focus:border-[#F67642]"
                  />
                </div>
              </div>

              <div>
                <p
                  class="mb-5 text-[13px] uppercase tracking-[0.32em] text-white/75"
                >
                  Message
                </p>

                <textarea
                  name="pesan"
                  rows="10"
                  placeholder="Tell us about your needs?"
                  class="min-h-[340px] w-full rounded-none border border-white/25 bg-transparent px-7 py-6 text-[17px] font-light text-white placeholder:text-white/35 outline-none transition focus:border-[#F67642]"
                ></textarea>
              </div>

              <div
                class="flex flex-col items-start justify-between gap-5 border-t border-white/15 pt-6 md:flex-row md:items-center"
              >
                <p class="max-w-[600px] text-[14px] leading-6 text-white/55">
                  By submitting this form, you agree that we can contact you back via email or the phone number you provide.
                </p>

                <button
                  type="submit"
                  class="inline-flex items-center border border-[#F67642] bg-[#F67642] px-8 py-4 text-[15px] font-medium text-white transition hover:bg-transparent hover:text-[#F67642]"
                >
                  Send Message
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script>
      const navItems = document.querySelectorAll(".nav-item");
      const highlight = document.getElementById("highlight");
      const navMenu = document.getElementById("navMenu");
      const navWrapper = document.getElementById("navWrapper");

      let activeIndex = 2;
      let lastScrollY = window.scrollY;

      function moveHighlight(index) {
        const item = navItems[index];
        if (!item || !highlight) return;

        highlight.style.left = item.offsetLeft + "px";
        highlight.style.width = item.offsetWidth + "px";
        highlight.style.height = item.offsetHeight + "px";
      }

      navItems.forEach((item, index) => {
        item.addEventListener("mouseenter", () => {
          moveHighlight(index);
        });

        item.addEventListener("click", () => {
          activeIndex = index;
          moveHighlight(activeIndex);
        });
      });

      if (navMenu) {
        navMenu.addEventListener("mouseleave", () => {
          moveHighlight(activeIndex);
        });
      }

      window.addEventListener("load", () => moveHighlight(activeIndex));
      window.addEventListener("resize", () => moveHighlight(activeIndex));

      window.addEventListener("scroll", () => {
        if (!navWrapper) return;

        const currentScrollY = window.scrollY;

        if (currentScrollY <= 10) {
          navWrapper.classList.remove("-translate-y-32");
          navWrapper.classList.add("translate-y-0");
        } else if (currentScrollY > lastScrollY) {
          navWrapper.classList.remove("translate-y-0");
          navWrapper.classList.add("-translate-y-32");
        } else {
          navWrapper.classList.remove("-translate-y-32");
          navWrapper.classList.add("translate-y-0");
        }

        lastScrollY = currentScrollY;
      });
    </script>
  </body>
</html>
